# Logging configuration
logging:
  level: info
  to_files: true
  files:
    path: /var/log/filebeat
    name: filebeat.log
    keepfiles: 7
    permissions: 0644

# Monitoring configuration
monitoring:
  enabled: true
  elasticsearch:
    hosts: ["elasticsearch:9200"]
    index: "filebeat-monitoring"

# Korean holiday calendar integration
setup.ilm:
  enabled: false

# HTTP endpoint for health checks
http:
  enabled: true
  host: "0.0.0.0"
  port: 5066

# X-Pack features
xpack:
  monitoring:
    enabled: true
    elasticsearch:
      hosts: ["elasticsearch:9200"]