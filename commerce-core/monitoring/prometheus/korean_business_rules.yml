# ==================================================
# Korean Business Rules for Prometheus Alerting
# Optimized for Korean E-commerce Patterns
# ==================================================

groups:
  # Korean Business Hours Alerts
  - name: korean_business_hours
    interval: 30s
    rules:
      # Peak lunch hour traffic alert (12-13 PM KST)
      - alert: HighTrafficDuringLunchHour
        expr: |
          (
            hour() >= 12 and hour() < 13
          ) and (
            rate(http_requests_total[5m]) > 100
          )
        for: 2m
        labels:
          severity: warning
          business_context: korean_lunch_hour
          team: korean_ops
        annotations:
          summary: "높은 트래픽 - 점심시간 (12-13시 KST)"
          description: "점심시간 중 높은 트래픽이 감지되었습니다. 현재 요청률: {{ $value }}/분"
          runbook_url: "https://runbooks.company.com/korean-lunch-hour-traffic"

      # Evening shopping rush alert (20-22 PM KST)
      - alert: HighTrafficDuringEveningRush
        expr: |
          (
            hour() >= 20 and hour() < 22
          ) and (
            rate(http_requests_total[5m]) > 200
          )
        for: 2m
        labels:
          severity: warning
          business_context: korean_evening_rush
          team: korean_ops
        annotations:
          summary: "높은 트래픽 - 저녁 쇼핑시간 (20-22시 KST)"
          description: "저녁 쇼핑시간 중 높은 트래픽이 감지되었습니다. 현재 요청률: {{ $value }}/분"

      # Weekend traffic pattern alert
      - alert: UnexpectedWeekendTraffic
        expr: |
          (
            day_of_week() == 0 or day_of_week() == 6
          ) and (
            rate(http_requests_total[5m]) > 150
          )
        for: 5m
        labels:
          severity: info
          business_context: korean_weekend
          team: korean_ops
        annotations:
          summary: "주말 높은 트래픽 감지"
          description: "주말에 예상보다 높은 트래픽이 감지되었습니다. 프로모션 또는 이벤트 확인 필요"

      # Korean holidays traffic alert
      - alert: KoreanHolidayTrafficAnomaly
        expr: |
          korean_holiday_indicator == 1 and (
            rate(http_requests_total[5m]) > 50 or 
            rate(http_requests_total[5m]) < 5
          )
        for: 10m
        labels:
          severity: info
          business_context: korean_holiday
          team: korean_ops
        annotations:
          summary: "한국 공휴일 트래픽 이상"
          description: "한국 공휴일 중 비정상적인 트래픽 패턴이 감지되었습니다"

  # Korean Payment Gateway Alerts
  - name: korean_payment_gateways
    interval: 15s
    rules:
      # KakaoPay issues
      - alert: KakaoPayHighErrorRate
        expr: |
          (
            rate(payment_gateway_errors_total{gateway="kakao_pay"}[5m]) / 
            rate(payment_gateway_requests_total{gateway="kakao_pay"}[5m])
          ) > 0.05
        for: 1m
        labels:
          severity: critical
          payment_gateway: kakao_pay
          team: payment_team
        annotations:
          summary: "카카오페이 오류율 높음"
          description: "카카오페이 오류율이 5%를 초과했습니다. 현재 오류율: {{ $value | humanizePercentage }}"
          runbook_url: "https://runbooks.company.com/kakaopay-errors"

      # NaverPay issues
      - alert: NaverPaySlowResponse
        expr: |
          histogram_quantile(0.95, 
            rate(payment_gateway_duration_seconds_bucket{gateway="naver_pay"}[5m])
          ) > 3
        for: 2m
        labels:
          severity: warning
          payment_gateway: naver_pay
          team: payment_team
        annotations:
          summary: "네이버페이 응답 지연"
          description: "네이버페이 95%tile 응답시간이 3초를 초과했습니다"

      # TossPay issues
      - alert: TossPayConnectionFailure
        expr: |
          up{job="korean-payment-gateways", gateway="toss_pay"} == 0
        for: 30s
        labels:
          severity: critical
          payment_gateway: toss_pay
          team: payment_team
        annotations:
          summary: "토스페이 연결 실패"
          description: "토스페이 게이트웨이에 연결할 수 없습니다"

      # Overall payment gateway health
      - alert: MultiplePaymentGatewaysDown
        expr: |
          count(up{job="korean-payment-gateways"} == 0) >= 2
        for: 1m
        labels:
          severity: critical
          team: payment_team
        annotations:
          summary: "다중 결제 게이트웨이 장애"
          description: "2개 이상의 한국 결제 게이트웨이에 문제가 발생했습니다"

  # Korean E-commerce Performance
  - name: korean_ecommerce_performance
    interval: 30s
    rules:
      # Cart abandonment rate
      - alert: HighCartAbandonmentRate
        expr: |
          (
            rate(cart_abandoned_total[10m]) / 
            rate(cart_created_total[10m])
          ) > 0.7
        for: 5m
        labels:
          severity: warning
          business_metric: cart_abandonment
          team: product_team
        annotations:
          summary: "높은 장바구니 이탈률"
          description: "장바구니 이탈률이 70%를 초과했습니다. 현재 이탈률: {{ $value | humanizePercentage }}"

      # Order conversion rate drop
      - alert: LowOrderConversionRate
        expr: |
          (
            rate(orders_completed_total[15m]) / 
            rate(cart_created_total[15m])
          ) < 0.02
        for: 10m
        labels:
          severity: warning
          business_metric: conversion_rate
          team: product_team
        annotations:
          summary: "주문 전환율 하락"
          description: "주문 전환율이 2% 미만으로 하락했습니다"

      # Korean product search performance
      - alert: SlowProductSearch
        expr: |
          histogram_quantile(0.95, 
            rate(product_search_duration_seconds_bucket{language="ko"}[5m])
          ) > 2
        for: 3m
        labels:
          severity: warning
          feature: product_search
          language: korean
          team: search_team
        annotations:
          summary: "한국어 상품 검색 지연"
          description: "한국어 상품 검색 95%tile 응답시간이 2초를 초과했습니다"

  # Korean Mobile App Metrics
  - name: korean_mobile_metrics
    interval: 60s
    rules:
      # Mobile app crash rate
      - alert: HighMobileAppCrashRate
        expr: |
          (
            rate(mobile_app_crashes_total{market="korea"}[10m]) / 
            rate(mobile_app_sessions_total{market="korea"}[10m])
          ) > 0.01
        for: 5m
        labels:
          severity: warning
          platform: mobile
          market: korea
          team: mobile_team
        annotations:
          summary: "한국 모바일 앱 크래시율 높음"
          description: "한국 모바일 앱 크래시율이 1%를 초과했습니다"

      # Mobile payment completion rate
      - alert: LowMobilePaymentCompletion
        expr: |
          (
            rate(mobile_payment_completed_total{market="korea"}[15m]) / 
            rate(mobile_payment_initiated_total{market="korea"}[15m])
          ) < 0.8
        for: 10m
        labels:
          severity: warning
          platform: mobile
          market: korea
          team: mobile_team
        annotations:
          summary: "모바일 결제 완료율 낮음"
          description: "한국 모바일 결제 완료율이 80% 미만입니다"

  # System Health for Korean Services
  - name: korean_system_health
    interval: 30s
    rules:
      # Database connection issues
      - alert: DatabaseConnectionPoolExhaustion
        expr: |
          postgresql_active_connections / postgresql_max_connections > 0.9
        for: 2m
        labels:
          severity: critical
          component: database
          team: platform_team
        annotations:
          summary: "데이터베이스 연결 풀 고갈 위험"
          description: "PostgreSQL 연결 풀 사용률이 90%를 초과했습니다"

      # Redis memory usage
      - alert: RedisMemoryUsageHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 3m
        labels:
          severity: warning
          component: cache
          team: platform_team
        annotations:
          summary: "Redis 메모리 사용량 높음"
          description: "Redis 메모리 사용량이 85%를 초과했습니다"

      # Korean CDN performance
      - alert: KoreanCDNSlowResponse
        expr: |
          histogram_quantile(0.95, 
            rate(cdn_response_duration_seconds_bucket{region="korea"}[5m])
          ) > 1
        for: 2m
        labels:
          severity: warning
          component: cdn
          region: korea
          team: platform_team
        annotations:
          summary: "한국 CDN 응답 지연"
          description: "한국 CDN 95%tile 응답시간이 1초를 초과했습니다"

  # Security Alerts for Korean Market
  - name: korean_security_alerts
    interval: 15s
    rules:
      # Suspicious Korean IP activity
      - alert: SuspiciousKoreanIPActivity
        expr: |
          rate(http_requests_total{status_code=~"4..", country="KR"}[5m]) > 50
        for: 2m
        labels:
          severity: warning
          security_alert: true
          country: korea
          team: security_team
        annotations:
          summary: "한국 IP에서 의심스러운 활동"
          description: "한국 IP에서 높은 4xx 오류율이 감지되었습니다"

      # Payment fraud detection
      - alert: PotentialPaymentFraud
        expr: |
          rate(payment_fraud_attempts_total{market="korea"}[5m]) > 5
        for: 1m
        labels:
          severity: critical
          security_alert: true
          fraud_type: payment
          team: security_team
        annotations:
          summary: "한국 시장 결제 사기 시도 감지"
          description: "한국에서 잠재적인 결제 사기 시도가 감지되었습니다"